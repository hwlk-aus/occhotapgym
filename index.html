<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymLog — Theo Dõi Lịch Tập</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Be+Vietnam+Pro:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f;
  --bg2: #141416;
  --bg3: #1c1c1f;
  --bg4: #242428;
  --accent: #c8f135;
  --accent2: #a8d020;
  --text: #f0f0ee;
  --muted: #6b6b72;
  --muted2: #9b9ba2;
  --border: rgba(255,255,255,0.08);
  --red: #ff5a4a;
  --blue: #4a9fff;
  --orange: #ff8c3a;
  --purple: #b06bff;
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Be Vietnam Pro', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,13,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--accent); }
.logo span { color: var(--text); }
.week-label { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
.header-right { display: flex; align-items: center; gap: 16px; }
.streak-badge {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 99px;
  font-size: 13px; font-weight: 500;
}
.streak-badge .fire { font-size: 16px; }

/* MAIN LAYOUT */
.main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

/* HERO STATS */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-bottom: 32px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative; overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}
.stat-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.15); }
.stat-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(200,241,53,0.04) 0%, transparent 60%);
}
.stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.stat-card .value { font-family: 'Barlow Condensed', sans-serif; font-size: 40px; color: var(--accent); line-height: 1; }
.stat-card .sub { font-size: 12px; color: var(--muted2); margin-top: 4px; }
.stat-card .icon-bg {
  position: absolute; right: 16px; top: 50%;
  transform: translateY(-50%);
  font-size: 36px; opacity: 0.12;
}

/* CONTENT GRID */
.content-grid {
  display: grid; grid-template-columns: 1fr 340px;
  gap: 24px; align-items: start;
}

/* WEEK CALENDAR */
.week-nav {
  display: flex; gap: 8px; margin-bottom: 20px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 6px;
}
.day-tab {
  flex: 1; padding: 10px 4px; border-radius: var(--radius-sm);
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 12px; transition: all 0.2s; text-align: center;
}
.day-tab .day-short { display: block; font-weight: 600; font-size: 13px; margin-bottom: 2px; }
.day-tab .day-num { display: block; font-size: 10px; color: var(--muted); }
.day-tab.active { background: var(--accent); color: #0d0d0f; }
.day-tab.active .day-num { color: rgba(13,13,15,0.6); }
.day-tab.done .day-short::after { content: '✓'; color: var(--accent); font-size: 10px; margin-left: 3px; }
.day-tab.rest { opacity: 0.4; }

/* WORKOUT CARD */
.workout-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.workout-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.workout-type {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
  padding: 5px 12px; border-radius: 99px; font-weight: 600;
}
.workout-title { font-family: 'Barlow Condensed', sans-serif; font-size: 30px; letter-spacing: 1px; margin-top: 4px; }
.workout-meta { display: flex; gap: 16px; margin-top: 8px; }
.meta-item { font-size: 12px; color: var(--muted2); display: flex; align-items: center; gap: 5px; }
.start-btn {
  background: var(--accent); color: #0d0d0f;
  border: none; border-radius: var(--radius-sm);
  padding: 12px 24px; font-weight: 600; font-size: 14px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
  font-family: 'Be Vietnam Pro', sans-serif;
}
.start-btn:hover { background: var(--accent2); transform: scale(1.02); }
.start-btn.done-btn { background: var(--bg4); color: var(--accent); border: 1px solid var(--accent); }

/* EXERCISE LIST */
.ex-list { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.ex-item {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: all 0.2s; position: relative;
}
.ex-item:hover { border-color: rgba(255,255,255,0.18); background: var(--bg4); }
.ex-item.completed { border-color: rgba(200,241,53,0.3); background: rgba(200,241,53,0.04); }
.ex-item.completed .ex-name { text-decoration: line-through; color: var(--muted); }
.ex-img {
  width: 60px; height: 60px; border-radius: 10px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 28px; background: var(--bg);
  border: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.ex-img svg { width: 52px; height: 52px; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-weight: 500; font-size: 14px; margin-bottom: 3px; }
.ex-target { font-size: 11px; color: var(--muted2); margin-bottom: 6px; }
.ex-sets-row { display: flex; gap: 6px; flex-wrap: wrap; }
.set-pill {
  font-size: 11px; padding: 3px 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 99px; color: var(--muted2);
  font-family: 'DM Mono', monospace;
}
.ex-check {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border); background: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0; color: transparent; font-size: 14px;
}
.ex-check:hover { border-color: var(--accent); }
.ex-item.completed .ex-check { background: var(--accent); border-color: var(--accent); color: #0d0d0f; }
.ex-detail-btn {
  font-size: 11px; color: var(--muted); text-decoration: none;
  position: absolute; right: 16px; bottom: 10px;
  background: none; border: none; cursor: pointer;
  font-family: 'Be Vietnam Pro', sans-serif; padding: 0;
}
.ex-detail-btn:hover { color: var(--accent); }

/* PROGRESS BAR */
.progress-wrap { padding: 16px 24px; border-top: 1px solid var(--border); }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted2); margin-bottom: 8px; }
.progress-bar { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1); }

/* SIDEBAR */
.sidebar { display: flex; flex-direction: column; gap: 16px; }

/* NUTRITION CARD */
.nutrition-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.card-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted2); }
.card-tag { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 600; }
.nutrition-hero { padding: 20px; text-align: center; }
.cal-display { font-family: 'Barlow Condensed', sans-serif; font-size: 64px; color: var(--accent); line-height: 1; }
.cal-label { font-size: 12px; color: var(--muted2); margin-top: 4px; }
.macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 20px 16px; }
.macro-item { background: var(--bg3); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
.macro-val { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; line-height: 1; }
.macro-key { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
.macro-bar { height: 3px; border-radius: 2px; margin-top: 8px; }

.meal-list { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 8px; }
.meal-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg3); border-radius: var(--radius-sm); padding: 12px;
}
.meal-icon { font-size: 22px; }
.meal-info { flex: 1; }
.meal-name { font-size: 13px; font-weight: 500; }
.meal-desc { font-size: 11px; color: var(--muted2); margin-top: 1px; }
.meal-kcal { font-size: 12px; font-weight: 600; color: var(--accent); font-family: 'DM Mono', monospace; }

/* WEEKLY PROGRESS */
.weekly-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.weekly-bars { display: flex; gap: 8px; align-items: flex-end; height: 80px; margin-top: 16px; }
.w-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.w-bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1); }
.w-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }

/* TIPS CARD */
.tips-card {
  background: linear-gradient(135deg, rgba(200,241,53,0.08) 0%, rgba(200,241,53,0.02) 100%);
  border: 1px solid rgba(200,241,53,0.2);
  border-radius: var(--radius); padding: 20px;
}
.tips-card .tip-title { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.tips-card .tip-text { font-size: 13px; color: var(--muted2); line-height: 1.6; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
  backdrop-filter: blur(8px);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 24px; width: 100%; max-width: 560px;
  max-height: 80vh; overflow-y: auto;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal-header {
  padding: 24px 24px 16px;
  display: flex; align-items: flex-start; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.modal-close {
  width: 32px; height: 32px; border-radius: 50%; background: var(--bg3);
  border: 1px solid var(--border); color: var(--muted2); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0; margin-top: 2px;
}
.modal-close:hover { background: var(--bg4); color: var(--text); }
.modal-body { padding: 20px 24px 24px; }
.modal-ex-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; letter-spacing: 1px; margin-bottom: 4px; }
.modal-tag { display: inline-flex; align-items: center; font-size: 11px; padding: 4px 12px; border-radius: 99px; font-weight: 600; margin-bottom: 16px; }
.anim-wrap {
  background: var(--bg3); border-radius: var(--radius); padding: 24px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px; min-height: 180px; position: relative; overflow: hidden;
}
.anim-wrap svg { width: 150px; height: 150px; }
.steps-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.step-item { display: flex; gap: 12px; align-items: flex-start; }
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(200,241,53,0.15); color: var(--accent);
  font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.step-text { font-size: 13px; color: var(--muted2); line-height: 1.6; }
.modal-sets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.mset-card {
  background: var(--bg3); border-radius: var(--radius-sm); padding: 14px;
  text-align: center; border: 1px solid var(--border);
}
.mset-val { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; color: var(--accent); line-height: 1; }
.mset-key { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.07em; }
.muscles-wrap { margin-top: 16px; }
.muscles-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.muscles-row { display: flex; gap: 6px; flex-wrap: wrap; }
.muscle-tag {
  font-size: 11px; padding: 4px 12px; border-radius: 99px;
  border: 1px solid var(--border); color: var(--muted2);
}
.muscle-tag.primary { border-color: rgba(200,241,53,0.4); color: var(--accent); background: rgba(200,241,53,0.07); }

/* NOTIFICATION */
.notif {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: var(--bg3); border: 1px solid rgba(200,241,53,0.3);
  border-radius: var(--radius-sm); padding: 14px 20px;
  font-size: 13px; color: var(--text);
  transform: translateX(120%); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.notif.show { transform: translateX(0); }
.notif .n-icon { font-size: 18px; }

/* REST DAY */
.rest-day {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 24px; text-align: center;
}
.rest-day .rest-icon { font-size: 64px; margin-bottom: 20px; }
.rest-day h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; color: var(--accent); margin-bottom: 8px; }
.rest-day p { font-size: 14px; color: var(--muted2); line-height: 1.7; max-width: 360px; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .content-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .sidebar { display: grid; grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .sidebar { grid-template-columns: 1fr; }
  .header { padding: 0 16px; }
  .main { padding: 20px 16px; }
  .modal-sets-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ANIMATIONS */
@keyframes fadeInUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
@keyframes wiggle { 0%,100% { transform:rotate(0); } 25% { transform:rotate(-5deg); } 75% { transform:rotate(5deg); } }
.fade-in { animation: fadeInUp 0.4s ease both; }
.fade-in:nth-child(1) { animation-delay: 0.05s; }
.fade-in:nth-child(2) { animation-delay: 0.1s; }
.fade-in:nth-child(3) { animation-delay: 0.15s; }
.fade-in:nth-child(4) { animation-delay: 0.2s; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">GYM<span>LOG</span></div>
  <span class="week-label" id="weekLabel"></span>
  <div class="header-right">
    <div class="streak-badge">
      <span class="fire">🔥</span>
      <span id="streakCount">0</span> ngày liên tiếp
    </div>
  </div>
</header>

<main class="main">
  <!-- STATS ROW -->
  <div class="stats-row" id="statsRow"></div>

  <div class="content-grid">
    <!-- LEFT: WORKOUT -->
    <div>
      <div class="week-nav" id="weekNav"></div>
      <div class="workout-section" id="workoutSection"></div>
    </div>

    <!-- RIGHT: SIDEBAR -->
    <div class="sidebar">
      <div class="nutrition-card" id="nutritionCard"></div>
      <div class="weekly-card" id="weeklyCard"></div>
      <div class="tips-card" id="tipsCard"></div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<!-- NOTIFICATION -->
<div class="notif" id="notif">
  <span class="n-icon">✓</span>
  <span id="notifText">Hoàn thành!</span>
</div>

// ─── STATE ───────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem("gymlog_v2") || "null") || {
  activeDay: new Date().getDay() === 0 ? 6 : new Date().getDay() - 1,
  completed: {},
  streak: 0,
  totalSessions: 0,
  weeklyDone: [0, 0, 0, 0, 0, 0, 0],
  lastTipIdx: 0
};
if (state.activeDay > 6) state.activeDay = 0;

function save() { localStorage.setItem("gymlog_v2", JSON.stringify(state)); }

function getCompletedKey(dayId, exId) { return ${dayId}_${exId}; }
function isDayFullyDone(dayId) {
  const day = WEEK_DATA[dayId];
  if (!day || day.isRest) return false;
  return day.exercises.every(ex => state.completed[getCompletedKey(dayId, ex.id)]);
}
function getProgress(dayId) {
  const day = WEEK_DATA[dayId];
  if (!day || day.isRest || !day.exercises.length) return 0;
  const done = day.exercises.filter(ex => state.completed[getCompletedKey(dayId, ex.id)]).length;
  return Math.round((done / day.exercises.length) * 100);
}

// ─── RENDER ──────────────────────────────────────────────
function renderStats() {
  const totalEx = Object.keys(state.completed).length;
  const sessionsThisWeek = WEEK_DATA.filter((d, i) => isDayFullyDone(i)).length;
  document.getElementById("statsRow").innerHTML = [
    { label: "Chuỗi hiện tại", value: state.streak, sub: "ngày liên tiếp", icon: "🔥" },
    { label: "Buổi tập tuần này", value: sessionsThisWeek, sub:/ 5 buổi mục tiêu`, icon: "📅" },
    { label: "Bài tập hoàn thành", value: totalEx, sub: "tổng cộng", icon: "✅" },
    { label: "Tổng buổi tập", value: state.totalSessions, sub: "từ trước đến nay", icon: "🏆" }
  ].map((s, i) => `
    <div class="stat-card fade-in">
      <div class="label">${s.label}</div>
      <div class="value">${s.value}</div>
      <div class="sub">${s.sub}</div>
      <div class="icon-bg">${s.icon}</div>
    </div>
  `).join("");
}

function renderWeekNav() {
  const today = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
  document.getElementById("weekNav").innerHTML = WEEK_DATA.map((d, i) => {
    let cls = "day-tab";
    if (i === state.activeDay) cls += " active";
    else if (d.isRest) cls += " rest";
    else if (isDayFullyDone(i)) cls += " done";
    return `<button class="${cls}" onclick="selectDay(${i})">
      <span class="day-short">${d.short}</span>
      <span class="day-num">${i === today ? "Hôm nay" : d.type === "Rest" ? "Nghỉ" : getProgress(i) + "%"}</span>
    </button>`;
  }).join("");
}

function renderWorkout() {
  const d = WEEK_DATA[state.activeDay];
  if (d.isRest) {
    document.getElementById("workoutSection").innerHTML = `
      <div class="rest-day">
        <div class="rest-icon">😴</div>
        <h2>Ngày Nghỉ Ngơi</h2>

          <div class="meal-desc">${m.desc}</div>
        </div>
        <span class="meal-kcal">${m.kcal}</span>
      </div>`).join("")}
    </div>`;
}

function renderWeekly() {
  const maxVal = Math.max(...state.weeklyDone, 5);
  document.getElementById("weeklyCard").innerHTML = `
    <div class="card-header" style="border:none;padding:0 0 0 0;margin-bottom:0">
      <span class="card-title" style="font-size:11px">Tiến trình tuần này</span>
      <span style="font-size:11px;color:var(--muted2)">${state.weeklyDone.filter(Boolean).length} / 5 buổi</span>
    </div>
    <div class="weekly-bars">
      ${WEEK_DATA.map((d, i) => {
        const h = Math.max(8, Math.round((state.weeklyDone[i] / maxVal) * 80));
        const active = i === state.activeDay;
        const isRest = d.isRest;
        return `<div class="w-bar-wrap">
          <div class="w-bar" style="height:${isRest ? 4 : h}px;background:${active ? 'var(--accent)' : isRest ? 'var(--bg4)' : state.weeklyDone[i] > 0 ? 'rgba(200,241,53,0.4)' : 'var(--bg4)'}"></div>
          <span class="w-label">${d.short}</span>
        </div>`;
      }).join("")}
    </div>`;
}

function renderTips() {
  const tip = TIPS[state.lastTipIdx % TIPS.length];
  document.getElementById("tipsCard").innerHTML = `
    <div class="tip-title">💡 Mẹo hôm nay</div>
    <div class="tip-text">${tip}</div>`;
}

function renderAll() {
  renderStats();
  renderWeekNav();
  renderWorkout();
  renderNutrition();
  renderWeekly();
  renderTips();
  document.getElementById("streakCount").textContent = state.streak;
  const now = new Date();
  document.getElementById("weekLabel").textContent = Tuần ${getWeekNumber(now)} • ${now.getFullYear()};
}

// ─── ACTIONS ─────────────────────────────────────────────
function selectDay(i) {
  state.activeDay = i;
  save();
  renderWeekNav();
  renderWorkout();
  renderNutrition();
  renderWeekly();
  renderTips();
}

function toggleEx(dayId, exId) {
  const key = getCompletedKey(dayId, exId);
  state.completed[key] = !state.completed[key];
  if (state.completed[key]) showNotif("✓ Hoàn thành bài tập!");
  save();
  renderWorkout();
  renderStats();
  renderWeekNav();
  if (isDayFullyDone(dayId)) {
    if (!state.weeklyDone[dayId]) {
      state.weeklyDone[dayId] = 1;
      state.totalSessions++;
      state.streak++;
      state.lastTipIdx++;
      save();
      setTimeout(() => showNotif("🎉 Hoàn thành buổi tập hôm nay!"), 300);
      renderStats();
      renderWeekly();
    }
  }
}

function markDayDone(dayId) {
  const day = WEEK_DATA[dayId];
  if (!day || day.isRest) return;
  const allDone = isDayFullyDone(dayId);
  day.exercises.forEach(ex => {
    state.completed[getCompletedKey(dayId, ex.id)] = !allDone;
  });
  if (!allDone && !state.weeklyDone[dayId]) {
    state.weeklyDone[dayId] = 1;
    state.totalSessions++;
    state.streak++;
    state.lastTipIdx++;
    setTimeout(() => showNotif("🎉 Xuất sắc! Buổi tập hoàn thành!"), 200);
  }
  save();
  renderAll();
}

function openModal(exId, dayId) {
  const day = WEEK_DATA[dayId];
  const ex = day.exercises.find(e => e.id === exId);
  if (!ex) return;
  const d = day;
  document.getElementById("modalContent").innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-ex-title">${ex.name}</div>
        <span class="modal-tag" style="background:${d.typeBg};color:${d.typeColor}">${d.type} — ${ex.target}</span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="anim-wrap">${getSVG(ex.svgKey)}</div>
      <div class="modal-sets-grid">
        <div class="mset-card"><div class="mset-val">${ex.sets}</div><div class="mset-key">Sets</div></div>
        <div class="mset-card"><div class="mset-val">${ex.reps}</div><div class="mset-key">Reps</div></div>
        <div class="mset-card"><div class="mset-val" style="font-size:18px">${ex.rest}</div><div class="mset-key">Nghỉ</div></div>
      </div>
      <div class="muscles-wrap">
        <div class="muscles-title">Nhóm cơ</div>
        <div class="muscles-row">
          ${ex.muscles.map((m, i) => <span class="muscle-tag ${i === 0 ? 'primary' : ''}">${m}</span>).join("")}
        </div>
      </div>
      <div class="muscles-title" style="margin-top:16px">Hướng dẫn kỹ thuật</div>
      <div class="steps-list">
        ${ex.steps.map((s, i) => <div class="step-item"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></div>).join("")}
      </div>
    </div>`;
  document.getElementById("modal").classList.add("open");
}

function closeModal() { document.getElementById("modal").classList.remove("open"); }
document.getElementById("modal").addEventListener("click", e => { if (e.target === e.currentTarget) closeModal(); });

function showNotif(msg) {
  const el = document.getElementById("notif");
  document.getElementById("notifText").textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2800);
}

function getWeekNumber(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7);
}

// ─── INIT ────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
